<svg xmlns="http://www.w3.org/2000/svg" width="900" height="910" viewBox="0 0 900 910" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif">
  <rect width="900" height="910" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#1f2937">카카오 로그인 → JWT 검증 → 역할 기반 홈 분기</text>
  <text x="450" y="64" text-anchor="middle" font-size="14" fill="#4b5563">반려견 유치원 인증·권한 API 전체 흐름</text>

  <g font-size="16" text-anchor="middle" fill="#1f2937">
    <rect x="245" y="90" width="410" height="56" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="450" y="114" font-weight="600">1. 카카오 로그인 시작</text><text x="450" y="134" font-size="13">브라우저 → 카카오 인증·동의</text>
    <line x1="450" y1="146" x2="450" y2="174" stroke="#6b7280" marker-end="url(#arrow)"/>

    <rect x="245" y="178" width="410" height="56" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="450" y="202" font-weight="600">2. OAuth 콜백 및 사용자 조회</text><text x="450" y="222" font-size="13">카카오 ID 기준으로 최초 가입 또는 기존 사용자 조회</text>
    <line x1="450" y1="234" x2="450" y2="262" stroke="#6b7280" marker-end="url(#arrow)"/>

    <rect x="245" y="266" width="410" height="56" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="450" y="290" font-weight="600">3. 자체 Access·Refresh JWT 발급</text><text x="450" y="310" font-size="13">사용자 식별자와 role claim 포함</text>
    <line x1="450" y1="322" x2="450" y2="350" stroke="#6b7280" marker-end="url(#arrow)"/>

    <rect x="245" y="354" width="410" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="450" y="378" font-weight="600">4. Refresh 쿠키 설정 후 프론트 리다이렉트</text><text x="450" y="398" font-size="13">KD_REFRESH: HttpOnly · SameSite=Lax · /api/auth</text>
    <line x1="450" y1="410" x2="450" y2="438" stroke="#6b7280" marker-end="url(#arrow)"/>

    <rect x="245" y="442" width="410" height="56" rx="10" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="450" y="466" font-weight="600">5. CSRF 토큰 발급 및 Refresh 호출</text><text x="450" y="486" font-size="13">Access JWT를 응답 body로 복원하여 메모리에 보관</text>
    <line x1="450" y1="498" x2="450" y2="526" stroke="#6b7280" marker-end="url(#arrow)"/>

    <rect x="245" y="530" width="410" height="56" rx="10" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="450" y="554" font-weight="600">6. Bearer Access JWT로 /api/home 호출</text><text x="450" y="574" font-size="13">Resource Server가 JWT 서명·만료를 검증</text>
    <line x1="450" y1="586" x2="450" y2="614" stroke="#6b7280" marker-end="url(#arrow)"/>

    <polygon points="450,618 570,670 450,722 330,670" fill="#f3f4f6" stroke="#6b7280"/>
    <text x="450" y="666" font-weight="600">7. role claim 확인</text><text x="450" y="686" font-size="13">OWNER / DIRECTOR / 없음</text>
  </g>

  <line x1="370" y1="710" x2="190" y2="756" stroke="#6b7280" marker-end="url(#arrow)"/>
  <line x1="450" y1="722" x2="450" y2="756" stroke="#6b7280" marker-end="url(#arrow)"/>
  <line x1="530" y1="710" x2="710" y2="756" stroke="#6b7280" marker-end="url(#arrow)"/>
  <g text-anchor="middle" fill="#1f2937">
    <rect x="50" y="760" width="280" height="92" rx="10" fill="#fef3c7" stroke="#d97706"/>
    <text x="190" y="790" font-size="17" font-weight="600">OWNER</text><text x="190" y="816" font-size="14">내 반려견 목록</text><text x="190" y="838" font-size="14">주변 유치원 목록</text>
    <rect x="310" y="760" width="280" height="92" rx="10" fill="#fee2e2" stroke="#dc2626"/>
    <text x="450" y="790" font-size="17" font-weight="600">role 없음</text><text x="450" y="822" font-size="14">403 Forbidden</text>
    <rect x="570" y="760" width="280" height="92" rx="10" fill="#dcfce7" stroke="#16a34a"/>
    <text x="710" y="790" font-size="17" font-weight="600">DIRECTOR</text><text x="710" y="816" font-size="14">등록 원생 목록</text><text x="710" y="838" font-size="14">당일 등원 현황</text>
  </g>
  <text x="450" y="885" text-anchor="middle" font-size="13" fill="#4b5563">인증 실패(토큰 없음·무효)는 401, 역할 미확정은 403 JSON 응답</text>
</svg>
