spring:
  application:
    name: knockdog-auth

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/knockdog}
    username: ${DB_USERNAME:knockdog}
    password: ${DB_PASSWORD:knockdog}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

# JWT (ADR-0003). 서명키는 환경변수 JWT_SECRET 로만 주입한다 (하드코딩 금지).
jwt:
  secret: ${JWT_SECRET}
  access-exp: 30m
  refresh-exp: 14d

# 카카오 OAuth2 설정은 feature/kakao-login 브랜치에서 추가한다.
