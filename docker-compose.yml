services:
  mysql:
    image: mysql:8.0
    container_name: knockdog-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME:-knockdog}
      MYSQL_USER: ${DB_USERNAME:-knockdog}
      MYSQL_PASSWORD: ${DB_PASSWORD:-knockdog}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - knockdog-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  knockdog-mysql-data:
